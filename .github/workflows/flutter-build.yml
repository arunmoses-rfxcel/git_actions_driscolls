name: 'Flutter Build APK & iOS'

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  # --------------------------------------------------------
  # ANDROID BUILD JOB
  # --------------------------------------------------------
  build-android:
    name: 'Build Android APK'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

          # CRITICAL: Clear Gradle Cache First
      - name: Delete Gradle Cache
        run: |
          rm -rf ~/.gradle/caches
          rm -rf android/.gradle
          rm -rf android/app/.gradle
          
          # Clear Flutter Cache
      - name: Delete Flutter Cache
        run: |
          rm -rf ~/.flutterools
          rm -rf .dart_tool
          rm -rf build
          rm -rf .dart_tool
          rm -rf .flutter-plugins
          rm -rf .flutter-plugins-dependencies
          rm -rf .packages

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          cache: false  # ← Disable caching

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

          # Verify files are updated
      - name: Verify Kotlin Version (Check Files)
        run: |
          echo "=== android/build.gradle ==="
          cat android/build.gradle
                    
          echo "=== android/gradle.properties ==="
          cat android/gradle.properties
                    
          echo "=== android/app/build.gradle ==="
          cat android/app/build.gradle
        shell: bash

      - name: Clean Flutter
        run: flutter clean

      - name: Clean Android Gradle
        run: |
          cd android
          gradlew clean
          cd ..

      - name: Check If gradlew Exists
        run: |
          echo "=== Looking for gradlew ==="
          find . -name "gradlew" -type f
          echo "=== Contents of android/ ==="
          ls -la android/

      - name: Get Dependencies
        run: flutter pub get

      # Optional: Uncomment if you use code generation (like build_runner)
      # - name: Run Code Generation
      #   run: dart run build_runner build --delete-conflicting-outputs

      - name: Print Versions (Debug)
        run: |
          echo "=== Flutter Version ==="
          flutter --version
            
          echo "=== Kotlin Version ==="
          grep "kotlin_version" android/build.gradle
            
          echo "=== AGP Version ==="
          grep "com.android.tools.build:gradle" android/build.gradle
            
          echo "=== Gradle Version ==="
          grep "distributionUrl" android/gradle/wrapper/gradle-wrapper.properties

      - name: Build APK with Verbose Output
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --verbose
        shell: /usr/bin/bash -e {0}

      - name: Build Android Release APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # --------------------------------------------------------
  # iOS BUILD JOB (Requires macOS Runner)
  # --------------------------------------------------------
  build-ios:
    name: 'Build iOS App'
    runs-on: macos-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Pre-configure iOS Project
        run: flutter build ios --config-only

      # iOS requires CocoaPods initialization before running the build
      - name: Install CocoaPods Dependencies
        run: |
          cd ios
          pod repo update 
          pod install
          cd ..

      # Note: This builds an unsigned .app file (good for validation checks).
      # To generate a signed .ipa for TestFlight, you must add Apple Certificates/Provisioning Profiles.
      - name: Build iOS (No Sign)
        run: flutter build ios --release --no-codesign

      - name: Compress iOS Build Output
        run: |
          cd build/ios/iphoneos
          zip -r Runner.app.zip Runner.app

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: build/ios/iphoneos/Runner.app.zip