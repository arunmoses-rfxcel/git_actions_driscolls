name: 'Flutter Build APK & iOS'

on:
  push:
    branches:
      - main
      - master
      - develop
      - release/*
      - hotfix/*
      - patch/*
  pull_request:
    branches:
      - main
      - master
      - develop
      - release/*
      - hotfix/*
      - patch/*
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  # --------------------------------------------------------
  # ANDROID BUILD JOB
  # --------------------------------------------------------
  build-android:
    name: 'Build Android APK'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

          # CRITICAL: Clear Gradle Cache First
      - name: Delete Gradle Cache
        run: |
          rm -rf ~/.gradle/caches
          rm -rf android/.gradle
          rm -rf android/app/.gradle
          
          # Clear Flutter Cache
      - name: Delete Flutter Cache
        run: |
          rm -rf ~/.flutterools
          rm -rf .dart_tool
          rm -rf build
          rm -rf .dart_tool
          rm -rf .flutter-plugins
          rm -rf .flutter-plugins-dependencies
          rm -rf .packages

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          cache: false  # ← Disable caching

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clean everything
        run: |
          flutter clean
          rm -rf ~/.gradle
          rm -rf ~/.pub-cache

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK with Verbose Output
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --verbose
        shell: /usr/bin/bash -e {0}

      - run: flutter test

      - name: Install dart_code_metrics
        run: dart pub global activate dart_code_metrics

      - name: Run Metrics
        run: dart pub global run dart_code_metrics:metrics analyze lib

      - name: Analyze Code
        run: flutter analyze --fatal-warnings

      - name: Build Android Release APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - run: flutter build appbundle